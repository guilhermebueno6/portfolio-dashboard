version: '3.9'

# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    ports: []  # Don't expose DB port in production

  redis:
    ports: []  # Don't expose Redis port in production

  backend:
    build:
      target: production
    command: node dist/index.js
    environment:
      - NODE_ENV=production
    volumes: []  # No bind mounts in production

  frontend:
    build:
      target: production
    command: node .output/server/index.mjs
    volumes: []

  nginx:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # Certbot SSL certs
