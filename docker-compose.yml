services:
  postgres:
    image: postgres:16-alpine
    container_name: dashboard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dashboard_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dashboard}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dashboard_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    networks:
      - dashboard_net
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redissecret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: dashboard_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-dashboard}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dashboard_net
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: dashboard_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:3001
      - NUXT_PUBLIC_WS_URL=ws://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - dashboard_net
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  dashboard_net:
    driver: bridge
